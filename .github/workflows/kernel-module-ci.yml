name: Kernel Module Build and Security Tests

on:
  push:
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-12-aarch64-linux-gnu make bc bison flex libssl-dev libelf-dev cppcheck
        sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/local/bin/aarch64-linux-gnu-gcc

    - name: Shallow clone Raspberry Pi kernel
      run: |
        git clone --depth=1 --branch rpi-6.12.y https://github.com/raspberrypi/linux rpi-linux
        echo "✓ Kernel source cloned"

    - name: Prepare kernel headers
      run: |
        cp src/kernel.config rpi-linux/.config
        cd rpi-linux
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
        echo "✓ Kernel headers prepared"

    - name: Build kernel module
      run: |
        cd src
        make KDIR=$GITHUB_WORKSPACE/rpi-linux ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KBUILD_MODPOST_WARN=1
        echo "✓ Module built successfully"
        find $GITHUB_WORKSPACE/src -name "*.ko" | head -5

    - name: Run cppcheck static analysis
      run: |
        echo "Running cppcheck static analysis..."
        cppcheck --suppress=missingIncludeSystem --error-exitcode=1 --force src/led_blink.c
        echo "✅ PASS: cppcheck found no critical issues"

    - name: Run kernel checkpatch
      run: |
        echo "Running kernel checkpatch.pl..."
        for f in src/*.c; do
          perl rpi-linux/scripts/checkpatch.pl --no-tree --file $f || true
        done
        echo "✅ Checkpatch complete"

    - name: Check for dangerous patterns
      run: |
        python3 << 'PYEOF'
        import sys
        from pathlib import Path

        errors = []
        for cfile in Path("src").glob("*.c"):
            if cfile.name.endswith('.mod.c'):
                continue
            source = cfile.read_text()
            for fn in ["strcpy", "sprintf", "gets", "strcat", "scanf"]:
                if fn + "(" in source:
                    errors.append(f"❌ {cfile.name}: Dangerous function {fn}()")
            if "PTR_ERR(" in source and "IS_ERR(" not in source:
                errors.append(f"❌ {cfile.name}: PTR_ERR without IS_ERR")
            if "MODULE_LICENSE" not in source:
                errors.append(f"❌ {cfile.name}: Missing MODULE_LICENSE")
            if "gpio_request" in source and "gpio_free" not in source:
                errors.append(f"❌ {cfile.name}: gpio_request without gpio_free")
            if "kthread_run" in source and "kthread_stop" not in source:
                errors.append(f"❌ {cfile.name}: kthread_run without kthread_stop")

        if errors:
            for e in errors:
                print(e)
            sys.exit(1)

        print("✅ PASS: No dangerous functions found")
        print("✅ PASS: Resource cleanup verified")
        PYEOF

    - name: Detect version
      id: detect
      run: |
        LATEST=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/releases/latest \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name','v0').lstrip('v'))" 2>/dev/null || echo "0")
        VERSION=$((LATEST + 1))
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 New version: $VERSION"

    - name: Prepare release files
      run: |
        VERSION=${{ steps.detect.outputs.version }}
        mkdir -p releases/v${VERSION}
        KO_FILE=$(find $GITHUB_WORKSPACE/src -name "*.ko" | head -1)
        echo "Found .ko at: $KO_FILE"
        cp $KO_FILE releases/v${VERSION}/module.ko
        echo "${VERSION}" > releases/v${VERSION}/version.txt
        cp src/mode.txt releases/v${VERSION}/mode.txt
        echo "✓ Release files prepared for v${VERSION}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.detect.outputs.version }}
        name: Kernel Module v${{ steps.detect.outputs.version }}
        files: |
          releases/v${{ steps.detect.outputs.version }}/module.ko
          releases/v${{ steps.detect.outputs.version }}/version.txt
          releases/v${{ steps.detect.outputs.version }}/mode.txt
        body: |
          ## Kernel Module Release v${{ steps.detect.outputs.version }}

          **Architecture:** ARM64 (Raspberry Pi)
          **Kernel:** rpi-6.12.y

          ### CI/CD Pipeline
          ✅ Cross-compiled (aarch64-linux-gnu)
          ✅ cppcheck static analysis
          ✅ checkpatch.pl
          ✅ Dangerous pattern detection
          ✅ Resource cleanup verification

          Ready for deployment.
