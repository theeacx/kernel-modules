name: Kernel Module Build and Security Tests

on:
  push:
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make bc bison flex libssl-dev libelf-dev cppcheck

    - name: Shallow clone Raspberry Pi kernel
      run: |
        git clone --depth=1 --branch rpi-6.12.y https://github.com/raspberrypi/linux rpi-linux
        echo "✓ Kernel source cloned"

    - name: Prepare kernel headers
      run: |
        cp src/kernel.config rpi-linux/.config
        cd rpi-linux
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
        echo "✓ Kernel headers prepared"

    - name: Build kernel module
      run: |
        cd src
        make KDIR=$GITHUB_WORKSPACE/rpi-linux ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KBUILD_MODPOST_WARN=1
        echo "✓ Module built successfully"
        find /home/runner/work -name "*.ko" 2>/dev/null || echo "NO KO FOUND ANYWHERE"
        ls -la

    - name: Run cppcheck static analysis
      run: |
        echo "Running cppcheck static analysis..."
        cppcheck --suppress=missingIncludeSystem --error-exitcode=1 --force src/*.c
        echo "✅ PASS: cppcheck found no critical issues"

    - name: Run kernel checkpatch
      run: |
        echo "Running kernel checkpatch.pl..."
        perl rpi-linux/scripts/checkpatch.pl --no-tree --file src/*.c || true
        echo "✅ Checkpatch complete"

    - name: Check for dangerous patterns
      run: |
        python3 << 'PYEOF'
        import sys
        from pathlib import Path

        source = Path("src/led_blink.c").read_text()
        errors = []

        dangerous = ["strcpy", "sprintf", "gets", "strcat", "scanf"]
        for fn in dangerous:
            if fn + "(" in source:
                errors.append(f"❌ Dangerous function found: {fn}()")

        if "PTR_ERR(" in source and "IS_ERR(" not in source:
            errors.append("❌ PTR_ERR used without IS_ERR check")

        if "MODULE_LICENSE" not in source:
            errors.append("❌ Missing MODULE_LICENSE")

        if "gpio_request" in source and "gpio_free" not in source:
            errors.append("❌ gpio_request without gpio_free (resource leak)")

        if "kthread_run" in source and "kthread_stop" not in source:
            errors.append("❌ kthread_run without kthread_stop (thread leak)")

        if errors:
            for e in errors:
                print(e)
            sys.exit(1)

        print("✅ PASS: No dangerous functions found")
        print("✅ PASS: Proper error handling detected")
        print("✅ PASS: Resource cleanup verified")
        print("✅ PASS: Thread lifecycle management verified")
        PYEOF

    - name: Detect version
      id: detect
      run: |
        LATEST=$(ls -td releases/v*/ 2>/dev/null | head -1)
        if [ -z "$LATEST" ]; then
          VERSION=1
        else
          LAST_VERSION=$(cat ${LATEST}version.txt)
          VERSION=$((LAST_VERSION + 1))
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 New version: $VERSION"

    - name: Prepare release files
      run: |
        VERSION=${{ steps.detect.outputs.version }}
        mkdir -p releases/v${VERSION}
        KO=$(ls src/*.ko | head -1) && cp $KO releases/v${VERSION}/module.ko
        echo "${VERSION}" > releases/v${VERSION}/version.txt
        cp src/mode.txt releases/v${VERSION}/mode.txt
        echo "✓ Release files prepared for v${VERSION}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.detect.outputs.version }}
        name: Kernel Module v${{ steps.detect.outputs.version }} (ethereum)
        files: |
          releases/v${{ steps.detect.outputs.version }}/module.ko
          releases/v${{ steps.detect.outputs.version }}/version.txt
          releases/v${{ steps.detect.outputs.version }}/mode.txt
        body: |
          ## Kernel Module Release v${{ steps.detect.outputs.version }}

          **Built from:** `src/led_blink.c`
          **Blockchain:** ethereum
          **Architecture:** ARM64 (Raspberry Pi)
          **Kernel:** rpi-6.12.y

          ### CI/CD Pipeline Steps
          ✅ Cross-compiled (aarch64-linux-gnu)
          ✅ cppcheck static analysis
          ✅ checkpatch.pl kernel coding standards
          ✅ Dangerous pattern detection
          ✅ Resource cleanup verification
          ✅ Thread lifecycle verification

          Ready for deployment.

