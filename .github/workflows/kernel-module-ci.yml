name: Kernel Module Security Tests

on:
  push:
    paths:
      - 'releases/**'
  workflow_dispatch:

permissions:
  contents: write  # Needed to create releases

jobs:
  security-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Detect new release
      id: detect
      run: |
        LATEST_DIR=$(ls -td releases/v*/ 2>/dev/null | head -1)
        if [ -z "$LATEST_DIR" ]; then
          echo "No releases found"
          exit 1
        fi
        
        VERSION=$(cat ${LATEST_DIR}version.txt)
        MODE=$(cat ${LATEST_DIR}mode.txt)
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "mode=$MODE" >> $GITHUB_OUTPUT
        echo "release_dir=$LATEST_DIR" >> $GITHUB_OUTPUT
        
        echo "📦 Detected kernel module: v$VERSION ($MODE)"
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dilithium-py
      run: pip install dilithium-py
    
    - name: Run signature tampering test
      run: |
        python3 << 'PYEOF'
        import sys
        import hashlib
        from pathlib import Path
        from dilithium_py.dilithium import Dilithium2
        
        def sha3_256_file(path):
            return hashlib.sha3_256(path.read_bytes()).digest()
        
        release_dir = Path("${{ steps.detect.outputs.release_dir }}")
        module = release_dir / "module.ko"
        
        if not module.exists():
            print(f"❌ Module not found: {module}")
            sys.exit(1)
        
        print("Testing signature tampering detection...")
        
        # Generate keypair
        pk, sk = Dilithium2.keygen()
        artifact_hash = sha3_256_file(module)
        print(f"✓ Hash: {artifact_hash.hex()[:32]}...")
        
        # Sign
        signature = Dilithium2.sign(sk, artifact_hash)
        print(f"✓ Signature: {len(signature)} bytes")
        
        # Verify valid signature
        if Dilithium2.verify(pk, artifact_hash, signature):
            print("✓ Valid signature accepted")
        else:
            print("❌ FAIL: Valid signature rejected")
            sys.exit(1)
        
        # Test tampered signature
        tampered_sig = bytearray(signature)
        tampered_sig[100] ^= 0xFF
        
        if Dilithium2.verify(pk, artifact_hash, bytes(tampered_sig)):
            print("❌ FAIL: Tampered signature accepted")
            sys.exit(1)
        
        print("✅ PASS: Signature tampering detection works")
        PYEOF
    
    - name: Run hash integrity test
      run: |
        python3 << 'PYEOF'
        import sys
        import hashlib
        import tempfile
        from pathlib import Path
        
        def sha3_256_file(path):
            return hashlib.sha3_256(path.read_bytes()).digest()
        
        release_dir = Path("${{ steps.detect.outputs.release_dir }}")
        module = release_dir / "module.ko"
        
        print("Testing hash integrity...")
        original_hash = sha3_256_file(module)
        print(f"✓ Original hash: {original_hash.hex()[:32]}...")
        
        data = module.read_bytes()
        tampered = bytearray(data)
        tampered[len(tampered)//2] ^= 0xFF
        
        with tempfile.NamedTemporaryFile(delete=False) as tmp:
            tmp.write(bytes(tampered))
            tmp_path = Path(tmp.name)
        
        tampered_hash = sha3_256_file(tmp_path)
        tmp_path.unlink()
        
        if original_hash == tampered_hash:
            print("❌ FAIL: Hashes identical despite tampering")
            sys.exit(1)
        
        print("✅ PASS: Hash integrity verification works")
        PYEOF
    
    - name: Create release if tests pass
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.detect.outputs.version }}
        name: Kernel Module v${{ steps.detect.outputs.version }} (${{ steps.detect.outputs.mode }})
        files: |
          ${{ steps.detect.outputs.release_dir }}module.ko
          ${{ steps.detect.outputs.release_dir }}version.txt
          ${{ steps.detect.outputs.release_dir }}mode.txt
        body: |
          ## Kernel Module Release v${{ steps.detect.outputs.version }}
          
          **Blockchain:** ${{ steps.detect.outputs.mode }}
          
          ### Security Tests
          ✅ Signature tampering detection  
          ✅ Hash integrity verification  
          ✅ All tests passed
          
          Ready for deployment.
